name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Audit & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm-audit
        continue-on-error: true
        run: |
          npm audit --audit-level=high --json > audit-results.json 2>&1 || true
          npm audit --audit-level=high 2>&1 | tee audit-output.txt

      - name: Run audit-ci
        id: audit-ci
        continue-on-error: true
        run: npx audit-ci --config audit-ci.json 2>&1 | tee audit-ci-output.txt

      - name: Build Next.js
        id: build
        run: npm run build

      - name: Comment PR with audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let auditOutput = '';
            try {
              auditOutput = fs.readFileSync('audit-output.txt', 'utf8');
            } catch {
              auditOutput = 'No npm audit output available.';
            }

            let auditCiOutput = '';
            try {
              auditCiOutput = fs.readFileSync('audit-ci-output.txt', 'utf8');
            } catch {
              auditCiOutput = 'No audit-ci output available.';
            }

            const hasVulnerabilities = auditOutput.includes('vulnerabilities') &&
              !auditOutput.includes('found 0 vulnerabilities');

            const body = `## 🔒 Security Audit Report

            ### npm audit
            \`\`\`
            ${auditOutput.slice(0, 4000)}
            \`\`\`

            ### audit-ci
            \`\`\`
            ${auditCiOutput.slice(0, 2000)}
            \`\`\`

            ${hasVulnerabilities ? '⚠️ **Vulnerabilities detected — review before merging.**' : '✅ **No high/critical vulnerabilities found.**'}
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if vulnerabilities found
        if: steps.npm-audit.outcome == 'failure' || steps.audit-ci.outcome == 'failure'
        run: |
          echo "::error::Security vulnerabilities found at high/critical level"
          exit 1
